aid: dati-emilia-romagna-it
name: dati.emilia-romagna.it
description: >-
  dati.emilia-romagna.it is a open data portal open-data portal for Italy running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 2,851 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
