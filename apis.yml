apis:
  - aid: dati-emilia-romagna-it:catalog
    name: dati.emilia-romagna.it CKAN Action API
    description: >-
      CKAN Action API for dati.emilia-romagna.it, a consistent JSON-over-HTTP interface over a catalog of 2,851 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://dati.emilia-romagna.it/api/3/action/.
    humanURL: https://dati.emilia-romagna.it
